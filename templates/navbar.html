<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eato Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {background: #f6f6f6; font-family: "Poppins", sans-serif}
        .navbar-custom{zoom:75%;background:#fff;padding:20px 35px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .search-box{width:560px;position:relative}
        .search-box input{height:58px;border-radius:15px;border:1px solid #ddd;padding-left:25px;padding-right:55px;font-size:15px}
        .search-box i{position:absolute;right:22px;top:50%;transform:translateY(-50%);color:#666;font-size:22px}
        .location{display:flex;align-items:center;gap:10px;margin-left:35px;padding-right:30px;border-right:1px solid #ddd}
        .location i{color:#ff5a1f;font-size:24px}
        .location small{color:gray;font-size:13px}
        .location h6{margin:0;font-weight:600}
        .cart-btn{background:#ff5a1f;color:white;border-radius:12px;padding:14px 22px;margin-left:30px;position:relative;border:none;font-weight:600}
        .cart-btn:hover{background:#f04a0f}
        .badge-cart{position:absolute;top:8px;right:10px;background:white;color:#ff5a1f;width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .profile{display:flex;align-items:center;gap:12px;margin-left:25px}
        .profile img{width:48px;height:48px;border-radius:50%;object-fit:cover}
        .profile h6{margin:0;font-weight:600}
        .toggle-btn{width:48px;height:48px;border:none;border-radius:12px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;justify-content:center;align-items:center}
    </style>

    <nav class="navbar navbar-custom">

        <div class="container-fluid d-flex align-items-center justify-content-between">
            <button class="toggle-btn me-3" id="toggleSidebar">
                <i class="bi bi-list fs-3"></i>
            </button>
            <!-- Search -->

            <div class="search-box">

                <input type="text" class="form-control" placeholder="Search for restaurants, cuisines or food...">

                <i class="bi bi-search"></i>

            </div>

            <!-- Right -->

            <div class="d-flex align-items-center">

                <div class="location">

                    <i class="bi bi-geo-alt-fill"></i>

                    <div>

                        <small>Deliver to</small>

                        <h6>Hosur, India <i class="bi bi-chevron-down small"></i></h6>

                    </div>

                </div>

                <!-- Cart -->

                <a href="{% url 'cart' %}" class="cart-btn">

                    <i class="bi bi-cart3 fs-4"></i>

                    Cart

                </a>

                <!-- Profile -->

                <div class="profile">

                    <img src="https://i.pravatar.cc/100?img=12">

                    <h6>Hi, Harish <i class="bi bi-chevron-down"></i></h6>

                </div>

            </div>

        </div>

    </nav>
