<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Admin Profile | Eato</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
        }

        .profile-card{
            max-width:700px;
            margin:60px auto;
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.08);
        }

        .card-header{
            background:#212529;
            color:#fff;
            padding:30px;
            text-align:center;
        }

        .profile-image{
            width:140px;
            height:140px;
            border-radius:50%;
            border:5px solid #fff;
            object-fit:cover;
            box-shadow:0 10px 25px rgba(0,0,0,.2);
        }

        .image-wrapper{
            margin-top:-70px;
            text-align:center;
        }

        .card-body{
            padding:35px;
        }

        .form-label{
            font-weight:600;
            color:#555;
        }

        .form-control{
            border-radius:12px;
            height:48px;
        }

        input[type=file]{
            padding:10px;
            height:auto;
        }

        .btn-save{
            background:#212529;
            color:#fff;
            border:none;
            border-radius:12px;
            height:50px;
            font-weight:600;
            transition:.3s;
        }

        .btn-save:hover{
            background:#000;
            transform:translateY(-2px);
        }

        .btn-back{
            border-radius:12px;
            height:50px;
        }

        .small-text{
            color:#888;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card profile-card">

        <div class="card-header">

            <h3>
                <i class="bi bi-person-circle"></i>
                Edit Admin Profile
            </h3>
            <br>
            <br>

        </div>

        <div class="image-wrapper">

            <img id="preview"
                 src="https://i.pinimg.com/originals/6f/6c/af/6f6cafaffc78e29ee03b3680f47d3351.jpg"
                 class="profile-image">

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-4">

                    <label class="form-label">
                        <i class="bi bi-person-fill"></i>
                        Admin Name
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            name="name"
                            value="{{ request.user.first_name }}"
                            placeholder="Enter Admin Name">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        <i class="bi bi-camera-fill"></i>
                        Profile Picture
                    </label>

                    <input
                            type="file"
                            class="form-control"
                            id="profileImage"
                            name="profile_image"
                            accept="image/*">

                    <div class="small-text mt-2">
                        JPG, PNG or JPEG (Max 2MB)
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-2">

                        <a href="{% url 'admindashboard' %}"
                           class="btn btn-outline-secondary btn-back w-100">

                            <i class="bi bi-arrow-left"></i>

                            Back

                        </a>

                    </div>

                    <div class="col-md-6">

                        <button class="btn btn-save w-100">

                            <i class="bi bi-check-circle"></i>

                            Save Changes

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document
.getElementById("profileImage")
.addEventListener("change",function(event){

    const reader=new FileReader();

    reader.onload=function(){

        document
        .getElementById("preview")
        .src=reader.result;

    }

    if(event.target.files[0]){
        reader.readAsDataURL(event.target.files[0]);
    }

});
</script>

</body>
</html>
