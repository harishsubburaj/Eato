<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eato Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    min-height:100vh;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
}

/* Main Container */

.login-container{
    width:96%;
    height:95vh;
    margin:2.5vh auto;
    background:#fff;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

/* Left Side */

.left-section{
    height:95vh;
    padding:0;
}

.left-section img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Right Side */

.right-section{
    height:95vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
}

/* Login Card */

.login-card{
    zoom: 80%;
    width:100%;
    max-width:650px;
    background:#fff;
    padding:60px;
    border-radius:50px;
    box-shadow:0 10px 25px rgba(5, 5, 5, 0.05);
}

.login-title{
    font-size:48px;
    font-weight:700;
    color:#1f1f1f;
}

.login-subtitle{
    color:#8a8a8a;
    margin-top:10px;
    margin-bottom:35px;
}

.form-control{
    height:60px;
    border-radius:12px;
    border:1px solid #e3e3e3;
}

.form-control:focus{
    box-shadow:none;
    border-color:#ff5a00;
}

.input-group-text{
    background:#fff;
    border-right:none;
    color:#ff5a00;
}

.btn-login{
    height:60px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff6600,#ff3d00);
    color:#fff;
    font-size:20px;
    font-weight:600;
}

.btn-login:hover{
    background:linear-gradient(90deg,#ff3d00,#ff6600);
    color:#fff;
}

.social-btn{
    height:55px;
    border-radius:12px;
}

.signup-link,
.forgot-link{
    color:#ff5a00;
    text-decoration:none;
    font-weight:600;
}

.divider{
    text-align:center;
    color:#999;
    margin:25px 0;
}

@media(max-width:991px){

    body{
        overflow:auto;
    }

    .login-container{
        height:auto;
        margin:0;
        width:100%;
        border-radius:0;
    }

    .left-section{
        display:none;
    }

    .right-section{
        height:auto;
        padding:40px 20px;
    }

    .login-card{
        box-shadow:none;
        padding:40px;
    }

    .login-title{
        font-size:36px;
    }
}

</style>
</head>
<body>

<div class="container-fluid">

    <div class="row g-0 login-container">

        <!-- LEFT IMAGE -->

        <div class="col-lg-5 left-section">

            <!-- Change image path if needed -->
            <img src="{% static 'images/1000343642.jpg' %}" alt="Food Banner">

        </div>

        <!-- RIGHT LOGIN -->

        <div class="col-lg-7 right-section">

            <div class="login-card">

                <div class="text-center">

                    <h1 class="login-title">
                        Welcome Back!
                    </h1>

                    <p class="login-subtitle">
                        Login to continue your delicious journey
                    </p>

                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="input-group mb-4">

                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>

                        <input type="text"
                               name="email"
                               class="form-control"
                               placeholder="Email or Username">

                    </div>

                    <div class="input-group mb-3">

                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>

                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Password">

                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div class="form-check">

                            <input class="form-check-input"
                                   type="checkbox"
                                   id="remember">

                            <label class="form-check-label"
                                   for="remember">

                                Remember me

                            </label>

                        </div>

                        <a href="#" class="forgot-link">
                            Forgot Password?
                        </a>

                    </div>

                    <button type="submit"
                            class="btn btn-login w-100">

                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Login

                    </button>

                    <div class="divider">
                        ───── or continue with ─────
                    </div>

                    <div class="row g-3">

                        <div class="col-6">

                            <button type="button"
                                    class="btn btn-outline-secondary social-btn w-100">

                                <i class="bi bi-google text-danger me-2"></i>
                                Google

                            </button>

                        </div>

                        <div class="col-6">

                            <button type="button"
                                    class="btn btn-outline-secondary social-btn w-100">

                                <i class="bi bi-facebook text-primary me-2"></i>
                                Facebook

                            </button>

                        </div>

                    </div>

                    <div class="text-center mt-4">

                        Don't have an account?

                        <a href="{% url 'signup' %}" class="signup-link">
                            Sign Up
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let password=document.getElementById("password");
    let eye=document.getElementById("eyeIcon");

    if(password.type==="password"){
        password.type="text";
        eye.classList.replace("bi-eye","bi-eye-slash");
    }else{
        password.type="password";
        eye.classList.replace("bi-eye-slash","bi-eye");
    }

}

</script>

</body>
</html>
