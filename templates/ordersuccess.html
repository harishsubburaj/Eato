{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Success | Eato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>

        body{
            background:#f8f9fa;
            overflow-x:hidden;
        }

        .sidebar-area{
            width:200px;
            position:fixed;
            left:0;
            top:0;
            bottom:0;
            background:white;
            z-index:1000;
            transition:.3s;
        }

        .sidebar-area.hide{
            transform:translateX(-200px);
        }

        .main-content{
            margin-left:200px;
            transition:.3s;
        }

        .main-content.expand{
            margin-left:0;
        }

        .navbar-area{
            position:sticky;
            top:0;
            z-index:999;
            background:white;

        }

        .content{
            padding:10px;
        }

        .container{margin-top:80px}

    </style>
</head>
<body>
    <div class="sidebar-area" id="sidebar">{% include 'sidebar.html' %}</div>

    <div class="main-content" id="main">

        <div class="navbar-area">{% include 'navbar.html' %}</div>

        <div class="content">

            <div class="container text-center mt-5">

                <i class="bi bi-check-circle-fill text-success" style="font-size:100px;"></i>

                <h2 class="mt-4">Order Placed Successfully</h2>

                <p>Your food is being prepared.</p>

                <a href="{% url 'userdashboard' %}" class="btn btn-warning">Back To Home</a>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function () {

        const sidebar = document.getElementById("sidebar");
        const main = document.getElementById("main");
        const toggle = document.getElementById("toggleSidebar");

        if (toggle && sidebar && main) {

            toggle.addEventListener("click", function () {

                sidebar.classList.toggle("hide");
                main.classList.toggle("expand");

            });

        }

        // Hide sidebar by default on small screens
        if (window.innerWidth < 992 && sidebar && main) {
            sidebar.classList.add('hide');
            main.classList.add('expand');
        }

    });
    </script>
</body>
</html>
