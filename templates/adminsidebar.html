<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eato Admin Sidebar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    margin:0;
    background:#111;
    font-family:'Segoe UI',sans-serif;
}

.sidebar{
    zoom: 70%;
    width:300px;
    min-height:100vh;
    background:#141414;
    color:#fff;
    padding:25px 18px;
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo p{
    font-size:14px;
    color:#d4d4d4;
    margin-top:-6px;
}

.menu-title{
    color:#777;
    font-size:13px;
    font-weight:600;
    letter-spacing:1px;
    margin:28px 0 15px;
}

.sidebar ul{
    list-style:none;
    padding:0;
    margin:0;
}

.sidebar ul li{
    margin-bottom:10px;
}

.sidebar ul li a{
    color:#fff;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    border-radius:14px;
    transition:.3s;
}

.sidebar ul li a:hover{
    background:#232323;
}

.sidebar ul li.active a{
    background:#ff5a00;
}

.left{
    display:flex;
    align-items:center;
}

.left i{
    font-size:24px;
    margin-right:18px;
}

.left span{
    font-size:20px;
    font-weight:500;
}

.badge-order{
    background:red;
    color:#fff;
    border-radius:50%;
    width:28px;
    height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:bold;
}

hr{
    border-color:#303030;
    margin:20px 0;
}

.promo{
    border:1px solid #2f2f2f;
    border-radius:18px;
    text-align:center;
    padding:25px 15px;
    margin-top:30px;
}

.promo img{
    width:120px;
    margin-bottom:15px;
}

.promo h5{
    font-weight:700;
}

.promo p{
    color:#cfcfcf;
}

.view-btn{
    width:100%;
    border:2px solid #8d684c;
    color:#fff;
    border-radius:12px;
    padding:10px;
    background:transparent;
    transition:.3s;
}

.view-btn:hover{
    background:#ff5a00;
    border-color:#ff5a00;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#bcbcbc;
    font-size:14px;
}

</style>

</head>
<body>

<div class="sidebar">
<div class="logo">
{% load static %}
<a class="navbar-brand d-flex justify-content-center" href="#">
    <img src="{% static 'images/1000343641.jpg' %}"
         alt="Eato Logo"
         width="150"
         height="60"
         class="img-fluid">
</a>
<p>(Online food ordering site)</p>
</div>

<ul>

<li class="{% if request.resolver_match.url_name == 'admindashboard' %}active{% endif %}">
    <a href="{% url 'admindashboard' %}">
        <div class="left">
            <i class="bi bi-grid"></i>
            <span>Dashboard</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'addproduct' %}active{% endif %}">
    <a href="{% url 'addproduct' %}">
        <div class="left">
            <i class="bi bi-bag-plus"></i>
            <span>Add Product</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'addcategory' %}active{% endif %}">
    <a href="{% url 'addcategory' %}">
        <div class="left">
            <i class="bi bi-folder2-open"></i>
            <span>Add Category</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'incomeorder' %}active{% endif %}">
    <a href="{% url 'incomeorder' %}">
        <div class="left">
            <i class="bi bi-receipt-cutoff"></i>
            <span>Incoming Orders</span>
        </div>
    </a>
</li>

</a>
</li>

</ul>

<hr>

<div class="menu-title">
MANAGEMENT
</div>

<ul>

<li class="{% if request.resolver_match.url_name == 'users' %}active{% endif %}">
    <a href="{% url 'users' %}">
        <div class="left">
            <i class="bi bi-person"></i>
            <span>Users</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'addrestaurant' %}active{% endif %}">
    <a href="{% url 'addrestaurant' %}">
        <div class="left">
            <i class="bi bi-shop"></i>
            <span>Add Restaurant</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'banner' %}active{% endif %}">
    <a href="{% url 'banner' %}">
        <div class="left">
            <i class="bi bi-image"></i>
            <span>Banners</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'coupon' %}active{% endif %}">
    <a href="{% url 'coupon' %}">
        <div class="left">
            <i class="bi bi-ticket-perforated"></i>
            <span>Coupons</span>
        </div>
    </a>
</li>

<li class="{% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
    <a href="{% url 'settings' %}">
        <div class="left">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
        </div>
    </a>
</li>

</ul>

<br>
<br>
<div class="footer">
© 2025 Eato. All rights reserved.
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const menu=document.querySelectorAll(".sidebar li");

menu.forEach(item=>{
item.addEventListener("click",function(){

menu.forEach(i=>i.classList.remove("active"));

this.classList.add("active");

});
});

</script>

</body>
</html>
