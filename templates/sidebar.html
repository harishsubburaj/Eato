<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eato Sidebar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#ececec;
    font-family:'Segoe UI',sans-serif;
}

.sidebar{
    zoom:75%;
    width:270px;
    min-height:100vh;
    background:#fff;
    padding:18px;
    border-right:1px solid #eee;
}



.logo{

    text-align:center;
    margin-bottom:20px;
}

.logo h1{

    color:#ff5a1f;
    font-size:55px;
    font-weight:800;
    margin-bottom:-5px;
}

.logo small{

    font-size:13px;
    color:#555;
}

.menu{

    margin-top:25px;
}

.menu a{

    display:flex;
    align-items:center;
    gap:15px;
    text-decoration:none;
    color:#444;
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:6px;
    transition:.3s;
    font-weight:500;
}

.menu a i{

    font-size:18px;
}

.menu a:hover{

    background:#fff2ed;
    color:#ff5a1f;
}

.menu a.active{

    background:#fff3ee;
    color:#ff5a1f;
    font-weight:600;
}

.menu a.active,
.help a.active{
    background:#ff5a00;
    color:#fff;
}

.menu a.active i,
.help a.active i{
    color:#fff;
}

.offer{

    background:#fff4ee;
    border-radius:18px;
    padding:20px;
    margin-top:30px;
    position:relative;
    overflow:hidden;
}

.offer h4{

    font-weight:700;
}

.offer p{

    font-size:14px;
    color:#555;
}

.offer button{

    border:2px dashed #ff6b35;
    background:#fff;
    color:#ff6b35;
    padding:8px 18px;
    border-radius:10px;
    font-weight:600;
}

.offer img{

    width:120px;
    position:absolute;
    bottom:0;
    right:0;
}

.help{

    margin-top:35px;
}

.help h5{

    font-weight:700;
    margin-bottom:20px;
}

.help a{

    display:flex;
    align-items:center;
    gap:15px;
    text-decoration:none;
    color:#555;
    padding:12px 10px;
    transition:.3s;
}

.help a:hover{

    color:#ff5a1f;
}

.arrow{

    margin-left:auto;
}

</style>

</head>
<body>

<div class="sidebar">

<div class="d-flex align-items-center mb-4">
{% load static %}
<div class="logo flex-grow-1">

<img src="{% static 'images/1000343641.jpg' %}"
         alt="Eato Logo"
         width="150"
         height="60"
         class="img-fluid">
<br>

<small>(Online food ordering site)</small>

</div>

</div>

<div class="menu">

<a href="{% url 'userdashboard' %}"
   class="{% if request.resolver_match.url_name == 'userdashboard' %}active{% endif %}">

    <i class="bi bi-house"></i>
    Home

</a>

<a href="#"
   class="{% if request.resolver_match.url_name == 'restaurants' %}active{% endif %}">

    <i class="bi bi-shop"></i>
    Restaurants

</a>

<a href="{% url 'category' %}"
   class="{% if request.resolver_match.url_name == 'category' %}active{% endif %}">

    <i class="bi bi-grid"></i>
    Categories
    <i class="bi bi-chevron-right arrow"></i>

</a>

</div>

<div class="help">

<h5>Need Help?</h5>

<a href="#"
   class="{% if request.resolver_match.url_name == 'help' %}active{% endif %}">

    <i class="bi bi-headset"></i>
    Help & Support

</a>

<a href="{% url 'myorders' %}"
   class="{% if request.resolver_match.url_name == 'myorders' %}active{% endif %}">

    <i class="bi bi-receipt"></i>
    My Orders

</a>

<a href="#"
   class="{% if request.resolver_match.url_name == 'addresses' %}active{% endif %}">

    <i class="bi bi-geo-alt"></i>
    My Addresses

</a>

<a href="#"
   class="{% if request.resolver_match.url_name == 'payments' %}active{% endif %}">

    <i class="bi bi-wallet2"></i>
    Payment Methods

</a>

<a href="{% url 'login' %}">

    <i class="bi bi-box-arrow-right"></i>
    Logout

</a>

</div>
</div>
</body>
</html>
