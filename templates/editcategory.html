{% load static %}
{% csrf_token %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add New Category | Eato Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
margin:0;
overflow-x:hidden;
background:#f8f9fa;
font-family:'Segoe UI',sans-serif;
}

.sidebar-wrapper{
position:fixed;
left:0;
top:0;
width:210px;
height:100vh;
z-index:1000;
transition:.3s;
}

.main-content{
margin-left:210px;
min-height:100vh;
transition:.3s;
}

.dashboard-body{
padding:25px;
zoom:80%;
}

.sidebar-hide{
transform:translateX(-210px);
}

.main-expand{
margin-left:0;
}

.form-card{
background:#fff;
border:none;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
margin-bottom:20px;
}

.form-card-header{
padding:25px 30px;
border-bottom:1px solid #ececec;
font-size:28px;
font-weight:700;
}

.form-card-body{
padding:30px;
}

.breadcrumb-box{
font-size:17px;
margin-bottom:25px;
}

.breadcrumb-box a{
text-decoration:none;
color:#ff5a00;
font-weight:600;
}

.breadcrumb-box span{
margin:0 10px;
color:#999;
}

.form-label{
font-weight:600;
margin-bottom:10px;
}

.form-control,
.form-select{
height:52px;
border-radius:10px;
}

textarea.form-control{
height:140px;
resize:none;
}

.required{
color:#ff5a00;
}

.upload-box{
border:2px dashed #d7d7d7;
border-radius:12px;
padding:40px;
text-align:center;
background:#fff;
}

.upload-box i{
font-size:60px;
color:#b8b8b8;
}

.guideline-box{
background:#eef5ff;
border:1px solid #d7e7ff;
border-radius:12px;
padding:25px;
height:100%;
}

.guideline-box h5{
color:#0d6efd;
font-weight:700;
margin-bottom:15px;
}

.guideline-box ul{
padding-left:20px;
margin-bottom:0;
}

.guideline-box li{
margin-bottom:10px;
color:#555;
}

.btn-orange{
background:#ff5a00 !important;
border:1px solid #ff5a00 !important;
color:#fff !important;
padding:12px 28px;
border-radius:10px;
font-weight:600;
transition:.3s;
}

.btn-orange:hover{
background:#e84e00 !important;
border-color:#e84e00 !important;
color:#fff !important;
}

.btn-light-custom{
background:#fff;
border:2px solid #000;
color:#000;
padding:12px 28px;
border-radius:10px;
font-weight:600;
text-decoration:none;
transition:.3s;
}

.btn-light-custom:hover{
background:#000;
color:#fff;
}

.upload-box{
border:2px dashed #d7d7d7;
border-radius:12px;
padding:35px;
text-align:center;
background:#fff;
transition:.3s;
}

.upload-box:hover{
border-color:#ff5a00;
}

.upload-box i{
font-size:60px;
color:#b7b7b7;
}

#previewImage{
width:180px;
height:180px;
object-fit:cover;
border-radius:12px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="sidebar-wrapper" id="sidebar">

{% include 'adminsidebar.html' %}

</div>

<div class="main-content" id="main">

{% include 'adminnavbar.html' %}

<div class="dashboard-body">

<h2 class="fw-bold mb-4">

Edit Category

</h2>

<div class="breadcrumb-box">

<a href="{% url 'admindashboard' %}">

Dashboard

</a>

<span>

<i class="bi bi-chevron-right"></i>

</span>

<a href="{% url 'addcategory' %}">

Categories

</a>

<span>

<i class="bi bi-chevron-right"></i>

</span>

<strong class="text-secondary">

Edit Category

</strong>

</div>

<div class="card form-card">

<div class="form-card-header">

Category Information

</div>

<div class="form-card-body">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="row">

<div class="col-lg-12">

<label class="form-label">

Category Name <span class="required">*</span>

</label>

<input
type="text"
name="name"
class="form-control"
value="{{ category.name }}"
required>

</div>

<div class="col-lg-12 mt-4">

<label class="form-label">

Status <span class="required">*</span>

</label>

<select name="status" class="form-select">

<option value="True" {% if category.status %}selected{% endif %}>
Active
</option>

<option value="False" {% if not category.status %}selected{% endif %}>
Inactive
</option>

</select>

</div>
<div class="col-lg-12 mt-4">

<label class="form-label">

Category Image

</label>

<div class="upload-box">

{% if category.image %}

<img src="{{ category.image.url }}"
     id="previewImage"
     class="img-fluid rounded mb-3"
     style="max-height:180px;">

{% else %}

<img id="previewImage"
     class="img-fluid rounded mb-3 d-none"
     style="max-height:180px;">

{% endif %}

<input type="file"
       id="categoryImage"
       name="image"
       accept="image/*"
       class="d-none">

<button type="button"
        class="btn btn-orange"
        onclick="document.getElementById('categoryImage').click();">

Choose Image

</button>

</div>

</div>
</div>

</div>
<br>

<!-- Buttons -->


<div class="form-card-body">

<div class="d-flex justify-content-between">

<a href="{% url 'addcategory' %}" class="btn btn-light-custom">

Cancel

</a>

<button type="submit" class="btn btn-orange text-white">

<i class="bi bi-floppy me-2"></i>

Save Category

</button>


</div>

</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

const toggle=document.getElementById("toggleSidebar");
const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");

if(toggle){

toggle.addEventListener("click",function(){

sidebar.classList.toggle("sidebar-hide");
main.classList.toggle("main-expand");

});

}


// Image Preview

const imageInput=document.getElementById("categoryImage");
const preview=document.getElementById("previewImage");

if(imageInput){

imageInput.addEventListener("change",function(e){

const file=e.target.files[0];

if(file){

preview.src=URL.createObjectURL(file);

preview.classList.remove("d-none");

}

});

}


});

</script>

</body>

</html>
