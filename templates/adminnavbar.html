<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Navbar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:'Segoe UI',sans-serif;
}

/* Navbar */

.admin-navbar{
    zoom: 70%;
    height:80px;
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    border-bottom:1px solid #ececec;
    box-shadow:0 2px 6px rgba(0,0,0,.05);
}

/* Left */

.nav-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.toggle-btn{
    border:none;
    background:none;
    font-size:28px;
    color:#444;
}

.page-title{
    font-size:38px;
    font-weight:700;
    color:#111;
}

/* Right */

.nav-right{
    display:flex;
    align-items:center;
    gap:35px;
}

/* Notification */

.notification{
    position:relative;
    font-size:28px;
    color:#333;
    cursor:pointer;
}

.notification .badge{
    position:absolute;
    top:-8px;
    right:-10px;
    background:#ff5a00;
    color:#fff;
    width:20px;
    height:20px;
    border-radius:50%;
    font-size:11px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Profile */

.profile{
    display:flex;
    align-items:center;
    gap:15px;
    cursor:pointer;
}

.profile img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.profile-details h6{
    margin:0;
    font-weight:700;
    font-size:18px;
}

.profile-details p{
    margin:0;
    font-size:13px;
    color:#777;
}

.dropdown-icon{
    font-size:16px;
    color:#444;
}

</style>

</head>

<body>

<nav class="admin-navbar">

<div class="nav-left">

<button type="button" class="toggle-btn" id="toggleSidebar">
    <i class="bi bi-list"></i>
</button>

<div class="page-title">
    {{ page_title }}
</div>

</div>

<div class="nav-right">

    <div class="profile">

        <img src="{{ profile.profile_image.url }}" alt="Admin">

        <div class="profile-details">
            <h6>{{ request.user.first_name }}</h6>
            <p>{{ request.user.username }}</p>
        </div>

        <div class="dropdown">
            <i class="bi bi-chevron-down dropdown-icon"
               data-bs-toggle="dropdown"></i>

            <ul class="dropdown-menu dropdown-menu-end">

                <li>
                    <a class="dropdown-item"
                       href="{% url 'edit_admin_profile' %}">
                        <i class="bi bi-pencil-square"></i>
                        Edit Profile
                    </a>
                </li>

                <li><hr class="dropdown-divider"></li>

                <li>
                    <a class="dropdown-item text-danger"
                       href="{% url 'home' %}">
                        <i class="bi bi-box-arrow-right"></i>
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</div>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById("toggleSidebar").addEventListener("click",function(){

console.log("Sidebar Toggle");

});

</script>

</body>
</html>
