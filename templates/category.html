{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Categories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
background:#f8f9fa;
overflow-x:hidden;
}

.sidebar-area{
width:200px;
position:fixed;
left:0;
top:0;
bottom:0;
background:#fff;
z-index:1000;
transition:.3s;
}

.sidebar-area.hide{
transform:translateX(-200px);
}

.main-content{
margin-left:200px;
transition:.3s;
}

.main-content.expand{
margin-left:0;
}

.navbar-area{
position:sticky;
top:0;
background:#fff;
z-index:999;
}

.content{
padding:25px;
}

.page-title{
font-size:34px;
font-weight:700;
margin-bottom:25px;
}

.category-card{

background:#fff;
border:none;
border-radius:18px;
overflow:hidden;
box-shadow:0 3px 15px rgba(0,0,0,.08);
transition:.3s;
text-decoration:none;
display:block;
color:#000;

}

.category-card:hover{

transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.category-card img{

width:100%;
height:240px;
object-fit:cover;

}

.category-body{

padding:18px;

}

.category-body h4{

margin:0;
font-weight:700;
text-align:center;

}

</style>

</head>

<body>

<div class="sidebar-area" id="sidebar">

{% include 'sidebar.html' %}

</div>

<div class="main-content" id="main">

<div class="navbar-area">

{% include 'navbar.html' %}

</div>

<div class="content">

<h2 class="page-title">

Food Categories

</h2>

<div class="row g-4">

{% for category in categories %}

<div class="col-lg-6 col-md-6">

<a href="#"
class="category-card">

<img src="{{ category.image.url }}"
alt="{{ category.name }}">

<div class="category-body">

<h4>

{{ category.name }}

</h4>

</div>

</a>

</div>

{% endfor %}

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");
const toggle=document.getElementById("toggleSidebar");

if(toggle){

toggle.onclick=function(){

sidebar.classList.toggle("hide");
main.classList.toggle("expand");

}

}

</script>

</body>

</html>
